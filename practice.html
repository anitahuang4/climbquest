<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>ClimbQuest — Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="match-hud">
    <div class="match-hud-left">
      <div class="nav-mark" style="width: 18px; height: 18px;"></div>
      <div class="eyebrow">Practice · solo · <span id="hudDiff">Novice</span></div>
    </div>
    <div class="match-hud-right">
      <div class="hud-stat">
        <div class="eyebrow">Streak</div>
        <div class="hud-stat-value">× <span id="streakDisplay">0</span></div>
      </div>
      <div class="hud-stat">
        <div class="eyebrow">Score</div>
        <div class="hud-stat-value"><span id="scoreDisplay">0</span></div>
      </div>
      <div class="timer" id="timer">60</div>
      <a class="back-btn" href="home.html">← Menu</a>
    </div>
  </div>

  <div class="match-shell">
    <div class="match-ambient"></div>

    <div class="match-body">

      <div class="iri-tree-wrap">
        <div class="iri-tree" id="iriTree">
          <div class="iri-tree-track"></div>
          <div class="iri-tree-finish" id="treeFinish">0</div>
          <div class="iri-tree-monkey" id="treeMonkey" style="top: 480px;">
            <div data-monkey data-size="64"></div>
          </div>
        </div>
        <div class="iri-tree-label">
          <div class="eyebrow">P01</div>
          <div class="iri-tree-label-name">YOU</div>
          <div class="iri-tree-label-score" id="treeScore">000</div>
        </div>
      </div>

      <div class="match-stage">
        <div class="difficulty-bar">
          <button class="diff-btn active" data-level="easy">Novice</button>
          <button class="diff-btn" data-level="medium">Climber</button>
          <button class="diff-btn" data-level="hard">Apex</button>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
          <div class="question-eyebrow">Solve</div>
          <div class="question-text" id="questionText">? × ?</div>
        </div>

        <div class="answer-area">
          <input type="number" id="answerInput" autocomplete="off" placeholder="——" />
          <button class="submit-btn" id="submitBtn">Enter</button>
        </div>

        <p class="feedback" id="feedback"></p>

        <!-- Hidden canvas: required by practice.js init() but the iridescent
             tree above replaces its visual role. -->
        <canvas id="gameCanvas" width="140" height="320"></canvas>

        <div class="game-over" id="gameOver">
          <div class="eyebrow eyebrow-dot">Round complete</div>
          <h2>Time's up.</h2>
          <p>Final score<strong id="finalScore">0</strong></p>
          <button class="play-again-btn" id="playAgainBtn">Climb again</button>
        </div>
      </div>
    </div>
  </div>

  <script src="monkey.js"></script>
  <script type="module" src="practice.js"></script>
  <script>
    // ---- Build the iridescent climbing tree rungs ----
    (function () {
      const RUNGS = 12;
      const TREE_HEIGHT = 520;
      const tree = document.getElementById('iriTree');
      const treeFinish = document.getElementById('treeFinish');
      const treeMonkey = document.getElementById('treeMonkey');
      const treeScore = document.getElementById('treeScore');
      const TARGET = 20;

      for (let i = 0; i < RUNGS; i++) {
        const t = i / (RUNGS - 1);
        const top = t * (TREE_HEIGHT - 60) + 20;
        const rung = document.createElement('div');
        rung.className = 'iri-tree-rung';
        rung.style.top = top + 'px';
        rung.dataset.threshold = (1 - t).toFixed(3);
        tree.appendChild(rung);
      }
      const rungs = tree.querySelectorAll('.iri-tree-rung');

      function setProgress(score) {
        const progress = Math.min(1, score / TARGET);
        rungs.forEach(r => {
          const threshold = parseFloat(r.dataset.threshold);
          r.classList.toggle('reached', threshold <= progress + 0.001);
        });
        const monkeyY = (1 - progress) * (TREE_HEIGHT - 60) + 20;
        treeMonkey.style.top = monkeyY + 'px';

        if (progress >= 0.999) {
          treeFinish.classList.add('reached');
          treeFinish.textContent = '▲';
        } else {
          treeFinish.classList.remove('reached');
          treeFinish.textContent = Math.round(progress * 100);
        }
        treeScore.textContent = String(score).padStart(3, '0');
      }
      setProgress(0);

      // Sync tree to score changes (practice.js writes #scoreDisplay).
      const scoreEl = document.getElementById('scoreDisplay');
      const observer = new MutationObserver(() => {
        const v = parseInt(scoreEl.textContent || '0', 10);
        if (!isNaN(v)) setProgress(v);
      });
      observer.observe(scoreEl, { childList: true, characterData: true, subtree: true });
    })();

    // ---- HUD timer pill: practice.js sets className 'timer warning|danger' ----
    // Add a leading dot before the time text — we render the dot via ::before
    // already, so no extra work needed.

    // ---- Streak counter (incremented on consecutive corrects) ----
    (function () {
      const feedback = document.getElementById('feedback');
      const streakEl = document.getElementById('streakDisplay');
      let streak = 0;
      const observer = new MutationObserver(() => {
        const txt = (feedback.textContent || '').toLowerCase();
        if (txt.startsWith('correct')) streak++;
        else if (txt.startsWith('wrong')) streak = 0;
        else return;
        streakEl.textContent = streak;
      });
      observer.observe(feedback, { childList: true, characterData: true, subtree: true });
    })();

    // ---- HUD difficulty label, kept in sync with the active diff-btn ----
    (function () {
      const labelEl = document.getElementById('hudDiff');
      const map = { easy: 'Novice', medium: 'Climber', hard: 'Apex' };
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          labelEl.textContent = map[btn.dataset.level] || 'Novice';
        });
      });
    })();

    // ---- Auto-submit on Enter (practice.js already handles this) ----
  </script>
</body>
</html>
